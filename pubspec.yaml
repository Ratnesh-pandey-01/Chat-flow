name: chat_flow
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  firebase_storage: ^13.2.0
  image_picker: ^1.2.1
  emoji_picker_flutter: ^4.4.0
  flutter_launcher_icons: ^0.14.4
  http: ^1.6.0
  google_fonts: ^8.0.2
  provider: ^6.1.5+1
  flutter_sound: ^9.30.0
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  just_audio: ^0.10.5
  get: ^4.7.3
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png 